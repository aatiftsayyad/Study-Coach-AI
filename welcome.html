<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Coach AI – Onboarding</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Shared design system -->
    <link rel="stylesheet" href="style.css">
    <!-- Onboarding specific styles -->
    <link rel="stylesheet" href="welcome.css">
</head>
<body>
    <main class="container">
        <section class="welcome-section glass-card">
            <header class="welcome-header">
                <h1 class="gradient-text">Welcome to Study Coach AI</h1>
                <p class="welcome-subtitle">Let’s build your personalized learning profile.</p>
            </header>

            <div id="step-container"></div>

            <footer class="welcome-footer">
                <div class="step-indicator" id="step-indicator"></div>
                <div class="nav-buttons">
                    <button id="btn-prev" class="btn btn-secondary" disabled>Back</button>
                    <button id="btn-next" class="btn btn-primary">Next</button>
                </div>
            </footer>
        </section>
    </main>

    <script src="welcome.js" defer></script>
</body>
</html>
