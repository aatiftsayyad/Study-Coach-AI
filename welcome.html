<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Coach AI - Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="welcome.css">
</head>
<body>
    <main class="welcome-shell">
        <section class="welcome-card">
            <div class="welcome-badge">🧠 Study Coach AI</div>
            <h1>Build your learning profile</h1>
            <p class="subtitle">Everything is stored locally in your browser so the coach remembers your goals, style, and weak spots.</p>

            <div class="step-indicator" id="stepIndicator"></div>
            <div id="stepContainer" class="step-container"></div>

            <div class="actions">
                <button id="btnBack" class="secondary" type="button">Back</button>
                <button id="btnNext" class="primary" type="button">Next</button>
            </div>
        </section>
    </main>

    <script src="welcome.js" defer></script>
</body>
</html>
